spring.application.name=login-hash

# ========================
# Banco de Dados PostgreSQL
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/login_hash_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Servidor
# ========================
server.port=8081

# ========================
# JWT Configuration
# ========================
# Replace with a strong, secure 256-bit key in production
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expirationMs=3600000

# ========================
# Mail Configuration (Mocked for testing)
# ========================
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
